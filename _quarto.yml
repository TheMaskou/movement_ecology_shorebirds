project:
  type: website
  output-dir: docs
  resources:
    - custom-hero.css
    - custom-scroll.js
    - styles.css
    - material/
  
  render:
    - index.qmd
    - qmd/**/*.qmd  # recursively render all .qmd files

    # - "!qmd/chapter_1/ch1_1_load_format.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_2_explore.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_4_motus_array_maintenance.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_5_survey_effort.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_6_estuary_usage_days.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_7_station_usage_hours.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_8_signal_strength.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_9_results.qmd"  # Exclude this specific file
    # - "!qmd/chapter_1/ch1_10_entropy_evenness_composition.qmd"  # Exclude this specific file

    
execute:
  freeze: auto #auto use cache results, false rerun everything

website:
  title: "Movement Ecology - Shorebirds"

  comments:
    hypothesis: true

  navbar:
    background: primary
    search: true

    logo: logo.png
        
    right:     
      - text: "PhD Project"
        href: qmd/myphd.qmd
        
      - sidebar:chapter1
      - sidebar:chapter2
      - sidebar:chapter3
      - sidebar:chapter4
      - sidebar:chapter5
      - sidebar:reports

      - text: "Get in touch"
        href: qmd/contact.qmd
        
  # Define multiple sidebars as a LIST
  sidebar:
    - id: chapter1
      title: "Chapter 1"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - section: "Data"
          contents:
            - qmd/chapter_1/ch1_1_load_format.qmd # Load and Format
            - qmd/chapter_1/ch1_2_explore.qmd # Explore
            - qmd/chapter_1/ch1_3_legend.qmd # Styles

        - section: "Motus array"
          contents:
            - qmd/chapter_1/ch1_4_motus_array_maintenance.qmd # Maintenance
            - qmd/chapter_1/ch1_5_survey_effort.qmd # Survey effort

        - section: "Analysis"
          contents:
            - qmd/chapter_1/ch1_6_estuary_usage_days.qmd  # Estuary Usage
            - qmd/chapter_1/ch1_7_station_usage_hours.qmd  # Station Usage rate
            - qmd/chapter_1/ch1_8_signal_strength.qmd  # Signal strength
            - qmd/chapter_1/ch1_10_entropy_evenness_composition.qmd # Shannon index

        - section: "Results"
          contents:
            - qmd/chapter_1/ch1_9_results.qmd # Results

        - section: "To-do-list"
          contents:
            - qmd/chapter_1/ch1_11_todo_list.qmd # To-do-list

    - id: chapter2
      title: "Chapter 2"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - section: "Prior"
          contents:
            - qmd/chapter_2/ch2_1.qmd # Prior estimations
            
        - section: "To-do-list"
          contents:
            - qmd/chapter_2/ch2_11.qmd # To-do-list

    - id: chapter3
      title: "Chapter 3"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - href: qmd/chapter_3/ch3_1.qmd

    - id: chapter4
      title: "Chapter 4"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - href: qmd/chapter_4/ch4_1.qmd

    - id: chapter5
      title: "Chapter 5"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - section: "Prior"
          contents:
            - qmd/chapter_5/ch5_1.qmd # Prior estimations
            
        
    - id: reports
      title: "Publications"
      style: docked
      background: light
      collapse-level: 3
      contents:
        - qmd/reports/pub_1.qmd  # us
        - qmd/reports/pub_2.qmd  # ethics + grant reports
        - qmd/reports/pub_3.qmd  # conference + papers
        - qmd/reports/pub_4.qmd  # milestones
        - qmd/reports/pub_5.qmd  # awards

            
format:
  html:
    theme: [cosmo, brand]
    css: styles.css
    toc: true
    include-after-body: _footer.html
    date: last-modified
    date-format: "iso"

editor: visual
